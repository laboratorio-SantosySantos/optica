<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Santos y Santos - Generador de recetas</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>

<style>
:root{--azul:#10aeea;--azul2:#0b4f91;--texto:#111827}
*{box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#eef5fa;color:var(--texto)}
header{background:white;border-bottom:4px solid var(--azul);padding:18px 28px;display:flex;align-items:center;gap:18px;box-shadow:0 2px 12px #0001}
.logo{height:72px;max-width:190px;object-fit:contain}
.brand h1{margin:0;font-size:22px}
.brand p{margin:2px 0 0;color:#3b82a0}
main{max-width:1200px;margin:22px auto;padding:0 18px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 4px 18px #00000014}
h2{margin:0 0 14px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
label{font-size:13px;color:#334155;font-weight:700}
input,select{width:100%;padding:10px;border:1px solid #b6dff2;border-radius:8px;font-size:15px}
input:focus,select:focus{outline:2px solid #8bd8f7}
table{width:100%;border-collapse:collapse;background:white}
th,td{border:1px solid #91d7f4;padding:8px;text-align:center}
th{background:#e9f8ff}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
button{border:0;border-radius:10px;padding:11px 14px;font-weight:800;cursor:pointer;background:var(--azul);color:white}
button.secondary{background:#0b4f91}
button.ghost{background:#e8f6fd;color:#0b4f91}
.msg{margin-top:10px;font-weight:700}
#recetaPrint{background:white;border:2px solid var(--azul);padding:10px;min-height:220px;position:relative;overflow:hidden}
.watermark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px;color:#0b4f9110;font-weight:900;pointer-events:none}
.rxTop{display:grid;grid-template-columns:190px 1fr 220px;gap:10px;position:relative}
.rxLogo{text-align:center;color:#001f54;font-weight:900}
.rxTable{margin-top:8px;position:relative}
.checks{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.box{border:1.5px solid var(--azul);padding:7px;text-align:center;font-weight:800}
.historial{grid-column:1/-1}
.scroll{max-height:300px;overflow:auto}
@media(max-width:900px){main{grid-template-columns:1fr}.rxTop{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<header>
  <img class="logo" src="logo.jpg" alt="Santos y Santos">
  <div class="brand">
    <h1>Santos y Santos Soluciones Ópticas</h1>
    <p>Generador de recetas oftálmicas</p>
  </div>
</header>

<main>
<section class="card">
  <h2>Captura de datos</h2>

  <div class="grid">
    <div>
      <label>Fecha</label>
      <input id="fecha" type="date">
    </div>

    <div>
      <label>Folio</label>
      <input id="folio" placeholder="Ej. SS-0001">
    </div>

    <div>
      <label>Cliente</label>
      <input id="cliente">
    </div>

    <div>
      <label>Armazón</label>
      <input id="armazon">
    </div>

    <div>
      <label>Material</label>
      <select id="material" required>
        <option value="">Selecciona material</option>
        <option value="Cr39">Cr39</option>
        <option value="HI AR">HI AR</option>
        <option value="Bluecut">Bluecut</option>
        <option value="Fotocromatico">Fotocromatico</option>
        <option value="Policarbonato">Policarbonato</option>
      </select>
    </div>

    <div>
      <label>Tipo de visión</label>
      <select id="tipoVision">
        <option value="">Selecciona tipo</option>
        <option value="V/S">V/S</option>
        <option value="F/T">F/T</option>
        <option value="Blended">Blended</option>
        <option value="Progresivo">Progresivo</option>
      </select>
    </div>

    <div>
      <label>DP</label>
      <input id="dp">
    </div>

    <div>
      <label>ALT</label>
      <input id="alt">
    </div>
  </div>

  <h3>Graduación</h3>

  <table>
    <thead>
      <tr>
        <th></th>
        <th>ESF.</th>
        <th>CIL.</th>
        <th>EJE</th>
        <th>ADD.</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th>OD</th>
        <td><input id="odEsf" type="number" step="0.25" min="-30" max="30"></td>
        <td><input id="odCil" type="number" step="0.25" min="-30" max="30"></td>
        <td><input id="odEje" type="number" step="1" min="0" max="180"></td>
        <td><input id="odAdd" type="number" step="0.25" min="-10" max="10"></td>
      </tr>
      <tr>
        <th>OI</th>
        <td><input id="oiEsf" type="number" step="0.25" min="-30" max="30"></td>
        <td><input id="oiCil" type="number" step="0.25" min="-30" max="30"></td>
        <td><input id="oiEje" type="number" step="1" min="0" max="180"></td>
        <td><input id="oiAdd" type="number" step="0.25" min="-10" max="10"></td>
      </tr>
    </tbody>
  </table>

  <div class="actions">
    <button onclick="guardar()">Guardar en tabla</button>
    <button class="ghost" onclick="limpiar()">Limpiar</button>
    <button class="secondary" onclick="enviarCorreo()">Enviar a correo</button>
    <button onclick="descargarXlsx()">Descargar XLSX</button>
    <button onclick="descargarPdf()">Descargar PDF</button>
  </div>

  <div id="msg" class="msg"></div>
</section>

<section class="card">
  <h2>Vista previa</h2>

  <div id="recetaPrint">
    <div class="watermark">S&S</div>

    <div class="rxTop">
      <div class="rxLogo">
        <img src="logo.jpg" alt="Santos y Santos" style="width:170px;max-height:115px;object-fit:contain">
      </div>

      <div>
        <div><b>Fecha:</b> <span id="pFecha"></span></div>
        <div><b>Cliente:</b> <span id="pCliente"></span></div>
        <div><b>Armazón:</b> <span id="pArmazon"></span></div>
        <div><b>Material:</b> <span id="pMaterial"></span></div>
      </div>

      <div>
        <div><b>Folio:</b> <span id="pFolio"></span></div>
        <br>
        <b>Tipo de visión:</b>
        <div class="checks">
          <div class="box" id="vVS">V/S</div>
          <div class="box" id="vFT">F/T</div>
          <div class="box" id="vBlended">Blended</div>
          <div class="box" id="vProgresivo">Progresivo</div>
        </div>
        <p><b>DP:</b> <span id="pDp"></span></p>
        <p><b>ALT:</b> <span id="pAlt"></span></p>
      </div>
    </div>

    <table class="rxTable">
      <thead>
        <tr>
          <th></th>
          <th>ESF.</th>
          <th>CIL.</th>
          <th>EJE</th>
          <th>ADD.</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th>OD</th>
          <td id="pOdEsf"></td>
          <td id="pOdCil"></td>
          <td id="pOdEje"></td>
          <td id="pOdAdd"></td>
        </tr>
        <tr>
          <th>OI</th>
          <td id="pOiEsf"></td>
          <td id="pOiCil"></td>
          <td id="pOiEje"></td>
          <td id="pOiAdd"></td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<section class="card historial">
  <h2>Recetas guardadas</h2>
  <div class="scroll">
    <table id="tabla">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</section>
</main>

<script>
const campos = [
  "fecha","folio","cliente","armazon","material","tipoVision",
  "odEsf","odCil","odEje","odAdd",
  "oiEsf","oiCil","oiEje","oiAdd",
  "dp","alt"
];

const titulos = [
  "Fecha","Folio","Cliente","Armazón","Material","Tipo visión",
  "OD ESF","OD CIL","OD EJE","OD ADD",
  "OI ESF","OI CIL","OI EJE","OI ADD",
  "DP","ALT"
];

let recetas = JSON.parse(localStorage.getItem("recetasSantos") || "[]");

document.getElementById("fecha").valueAsDate = new Date();
document.getElementById("folio").value = "SS-" + String(Date.now()).slice(-6);

campos.forEach(c => {
  document.getElementById(c).addEventListener("input", actualizarPreview);
});

actualizarPreview();
pintarTabla();

function datos() {
  let r = {};
  campos.forEach(c => r[c] = document.getElementById(c).value.trim());
  return r;
}

function actualizarPreview() {
  const r = datos();

  document.getElementById("pFecha").textContent = r.fecha || "";
  document.getElementById("pFolio").textContent = r.folio || "";
  document.getElementById("pCliente").textContent = r.cliente || "";
  document.getElementById("pArmazon").textContent = r.armazon || "";
  document.getElementById("pMaterial").textContent = r.material || "";
  document.getElementById("pDp").textContent = r.dp || "";
  document.getElementById("pAlt").textContent = r.alt || "";

  document.getElementById("pOdEsf").textContent = r.odEsf || "";
  document.getElementById("pOdCil").textContent = r.odCil || "";
  document.getElementById("pOdEje").textContent = r.odEje || "";
  document.getElementById("pOdAdd").textContent = r.odAdd || "";

  document.getElementById("pOiEsf").textContent = r.oiEsf || "";
  document.getElementById("pOiCil").textContent = r.oiCil || "";
  document.getElementById("pOiEje").textContent = r.oiEje || "";
  document.getElementById("pOiAdd").textContent = r.oiAdd || "";

  ["VS","FT","Blended","Progresivo"].forEach(v => {
    document.getElementById("v" + v).style.background = "white";
  });

  const map = {
    "V/S": "VS",
    "F/T": "FT",
    "Blended": "Blended",
    "Progresivo": "Progresivo"
  };

  if (r.tipoVision && map[r.tipoVision]) {
    document.getElementById("v" + map[r.tipoVision]).style.background = "#dff5ff";
  }
}

function guardar() {
  const r = datos();

  if (!r.cliente && !r.folio) {
    msg.textContent = "Agrega por lo menos cliente o folio.";
    return;
  }

  recetas.push(r);
  localStorage.setItem("recetasSantos", JSON.stringify(recetas));
  pintarTabla();
  msg.textContent = "Receta guardada.";
}

function limpiar() {
  campos.forEach(c => document.getElementById(c).value = "");
  document.getElementById("fecha").valueAsDate = new Date();
  document.getElementById("folio").value = "SS-" + String(Date.now()).slice(-6);
  actualizarPreview();
}

function pintarTabla() {
  tabla.querySelector("thead").innerHTML =
    "<tr>" + titulos.map(t => `<th>${t}</th>`).join("") + "</tr>";

  tabla.querySelector("tbody").innerHTML =
    recetas.map(r =>
      "<tr>" + campos.map(c => `<td>${r[c] || ""}</td>`).join("") + "</tr>"
    ).join("");
}

function libro() {
  const data = recetas.length ? recetas : [datos()];

  const rows = data.map(r => {
    let o = {};
    campos.forEach((c, i) => o[titulos[i]] = r[c] || "");
    return o;
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), "Recetas");
  return wb;
}

function descargarXlsx() {
  XLSX.writeFile(libro(), "recetas_santos_y_santos.xlsx");
}

function imgToDataURL(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";

    img.onload = () => {
      const c = document.createElement("canvas");
      c.width = img.naturalWidth;
      c.height = img.naturalHeight;
      c.getContext("2d").drawImage(img, 0, 0);
      resolve(c.toDataURL("image/jpeg", 0.92));
    };

    img.onerror = () => resolve(null);
    img.src = src;
  });
}

async function pdfBlob() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "landscape", unit: "pt", format: "letter" });
  const r = datos();

  const logo = await imgToDataURL("logo.jpg");
  if (logo) doc.addImage(logo, "JPEG", 38, 22, 150, 100);

  doc.setFontSize(17);
  doc.setTextColor(11, 79, 145);
  doc.text("Receta oftálmica", 210, 45);

  doc.setFontSize(11);
  doc.setTextColor(20, 20, 20);
  doc.text(`Fecha: ${r.fecha || ""}`, 210, 72);
  doc.text(`Folio: ${r.folio || ""}`, 560, 72);
  doc.text(`Cliente: ${r.cliente || ""}`, 210, 96);
  doc.text(`Armazón: ${r.armazon || ""}`, 210, 120);
  doc.text(`Material: ${r.material || ""}`, 210, 144);
  doc.text(`Tipo de visión: ${r.tipoVision || ""}`, 560, 96);
  doc.text(`DP: ${r.dp || ""}`, 560, 120);
  doc.text(`ALT: ${r.alt || ""}`, 560, 144);

  doc.autoTable({
    startY: 185,
    head: [["", "ESF.", "CIL.", "EJE", "ADD."]],
    body: [
      ["OD", r.odEsf || "", r.odCil || "", r.odEje || "", r.odAdd || ""],
      ["OI", r.oiEsf || "", r.oiCil || "", r.oiEje || "", r.oiAdd || ""]
    ],
    styles: {
      halign: "center",
      valign: "middle",
      fontSize: 14,
      lineColor: [16, 174, 234],
      lineWidth: 0.8,
      cellPadding: 12
    },
    headStyles: {
      fillColor: [233, 248, 255],
      textColor: [0, 31, 84],
      lineColor: [16, 174, 234]
    },
    columnStyles: {
      0: { fontStyle: "bold", fontSize: 18, cellWidth: 70 }
    }
  });

  const y = doc.lastAutoTable.finalY + 25;

  doc.autoTable({
    startY: y,
    head: [["Campo", "Valor", "Campo", "Valor"]],
    body: [
      ["Fecha", r.fecha || "", "Folio", r.folio || ""],
      ["Cliente", r.cliente || "", "Armazón", r.armazon || ""],
      ["Material", r.material || "", "Tipo de visión", r.tipoVision || ""],
      ["DP", r.dp || "", "ALT", r.alt || ""]
    ],
    styles: {
      fontSize: 10,
      lineColor: [16, 174, 234],
      lineWidth: 0.5,
      cellPadding: 7
    },
    headStyles: {
      fillColor: [11, 79, 145],
      textColor: [255, 255, 255]
    },
    columnStyles: {
      0: { fontStyle: "bold" },
      2: { fontStyle: "bold" }
    }
  });

  doc.setFontSize(9);
  doc.setTextColor(120, 120, 120);
  doc.text("Santos y Santos Soluciones Ópticas", 40, 570);

  return doc.output("blob");
}

async function descargarPdf() {
  const b = await pdfBlob();
  const a = document.createElement("a");
  a.href = URL.createObjectURL(b);
  a.download = "receta_santos_y_santos.pdf";
  a.click();
}

function blobToBase64(blob) {
  return new Promise((res) => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.readAsDataURL(blob);
  });
}

async function enviarCorreo() {
  msg.textContent = "Enviando...";

  try {
    const pdfBase64 = await blobToBase64(await pdfBlob());

    const xlsxBase64 = XLSX.write(libro(), {
      bookType: "xlsx",
      type: "base64"
    });

    const resp = await fetch("/send-email", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        receta: datos(),
        subject: "Nueva receta oftálmica",
        html: "<p>Se adjunta receta oftálmica de Santos y Santos.</p>",
        pdfBase64: pdfBase64,
        xlsxBase64: "data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64," + xlsxBase64,
        filename: "receta_santos_y_santos.pdf"
      })
    });

    const j = await resp.json();

    if (!j.ok) throw new Error(j.error);

    msg.textContent = "Correo enviado a santosysantosredes@gmail.com";
  } catch (e) {
    msg.textContent = "No se pudo enviar directo: " + e.message + " Puedes descargar PDF/XLSX y enviarlo manualmente.";
  }
}
</script>
</body>
</html>
